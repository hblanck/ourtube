services:
  ourtube:
    image: ghcr.io/hblanck/ourtube:latest
    build: .
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./public
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
        - action: rebuild
          path: ./Dockerfile
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ourtube-data:/data
      - ${NAS_SHARE_PATH:-/mnt/nas}:/media:ro   # Mount NAS shares here (read-only)
    environment:
      - DATA_DIR=/data
      - PORT=${PORT:-3000}
      - FACE_DETECTION_ENABLED=false
    restart: unless-stopped
volumes:
  ourtube-data:
