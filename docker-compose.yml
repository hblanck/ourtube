services:
  ourtube:
    image: ghcr.io/hblanck/ourtube:latest
    build: .
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./public
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
        - action: rebuild
          path: ./Dockerfile
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ourtube-data:/data
      - ${NAS_SHARE_PATH:-/mnt/nas}:/media:ro   # Mount NAS shares here (read-only)
    environment:
      - DATA_DIR=/data
      - PORT=${PORT:-3000}
      - FACE_DETECTION_ENABLED=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://opentelemetry:4318}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-ourtube}
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED:-false}
    restart: unless-stopped

  opentelemetry:
    image: otel/opentelemetry-collector-contrib:latest
    profiles:
      - opentelemetry
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    volumes:
      - ./telemetry/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    # Ephemeral collector storage for now; no persisted telemetry data yet.
    tmpfs:
      - /var/lib/otelcol
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles:
      - opentelemetry
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - opentelemetry
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./telemetry/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - opentelemetry
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles:
      - opentelemetry
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./telemetry/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./telemetry/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped
volumes:
  ourtube-data:
