version: '3.8'
services:
  ourtube:
    image: ghcr.io/hblanck/ourtube:latest
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ourtube-data:/data
      - ${NAS_SHARE_PATH:-/mnt/nas}:/media:ro   # Mount NAS shares here (read-only)
    environment:
      - DATA_DIR=/data
      - PORT=${PORT:-3000}
      - FACE_DETECTION_ENABLED=false
    restart: unless-stopped
volumes:
  ourtube-data:
