<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch – OurTube</title>
  <link rel="stylesheet" href="https://vjs.zencdn.net/8.10.0/video-js.min.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">📺 OurTube</a>
      <form class="search-form" action="/search.html" method="GET">
        <input type="search" name="q" class="search-input" placeholder="Search…" autocomplete="off" />
        <button type="submit" class="search-btn">🔍</button>
      </form>
      <nav class="header-nav">
        <a href="/" class="nav-link">🎬 Videos</a>
        <a href="/photos.html" class="nav-link">📷 Photos</a>
        <a href="/admin/" class="nav-link">⚙️ Admin</a>
      </nav>
    </div>
  </header>

  <div class="watch-layout">
    <div class="watch-main">
      <!-- Video Player -->
      <div id="player-container" class="player-container">
        <video id="video-player" class="video-js vjs-big-play-centered vjs-fluid" controls preload="auto"></video>
      </div>

      <!-- Photo viewer (shown instead of video for photos) -->
      <div id="photo-container" class="photo-container" style="display:none">
        <img id="photo-img" class="photo-full" src="" alt="" />
      </div>

      <div class="media-info">
        <h1 id="media-title" class="media-title">Loading…</h1>
        <div class="media-meta" id="media-meta"></div>
        <div class="media-desc" id="media-desc"></div>

        <div id="tags-container" class="tags-container"></div>
        <div id="faces-container" class="faces-container"></div>

        <div class="admin-edit-link">
          <a id="admin-edit-link" href="#" class="btn btn-small">✏️ Edit in Admin</a>
        </div>
      </div>
    </div>

    <aside class="watch-sidebar">
      <h3 class="sidebar-title">Up Next</h3>
      <div id="related-grid" class="related-grid"></div>
    </aside>
  </div>

  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <script src="/js/watch.js"></script>
</body>
</html>
