<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OurTube</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">📺 OurTube</a>
      <form class="search-form" action="/search.html" method="GET">
        <input type="search" name="q" class="search-input" placeholder="Search videos and photos…" autocomplete="off" />
        <button type="submit" class="search-btn">🔍</button>
      </form>
      <nav class="header-nav">
        <a href="/" class="nav-link active">🎬 Videos</a>
        <a href="/photos.html" class="nav-link">📷 Photos</a>
      </nav>
    </div>
  </header>

  <div class="page-layout">
    <aside class="sidebar">
      <button
        id="sidebar-toggle-btn"
        class="sidebar-toggle-btn"
        type="button"
        aria-expanded="true"
        aria-label="Hide filters"
        title="Hide filters"
      >
        <span class="sidebar-toggle-chevron" aria-hidden="true"></span>
      </button>
      <div class="sidebar-content">
      <div class="filter-section">
        <label class="filter-label">Collections</label>
        <div class="filter-options" id="source-location-filter">
          <label><input type="radio" name="source_location_id" value="" checked /> All Collections</label>
        </div>
      </div>

      <h3 class="sidebar-title">Filter</h3>

      <div class="filter-section">
        <label class="filter-label">Type</label>
        <div class="filter-options" id="type-filter">
          <label><input type="radio" name="type" value="" checked /> All</label>
          <label><input type="radio" name="type" value="video" /> Videos</label>
          <label><input type="radio" name="type" value="photo" /> Photos</label>
        </div>
      </div>

      <div class="filter-section">
        <label class="filter-label" for="year-filter">Year</label>
        <select id="year-filter" class="filter-select">
          <option value="">All Years</option>
        </select>
      </div>

      <div class="filter-section">
        <label class="filter-label" for="location-filter">Location</label>
        <select id="location-filter" class="filter-select">
          <option value="">All Locations</option>
        </select>
      </div>

      <div class="filter-section">
        <label class="filter-label">Sort By</label>
        <select id="sort-select" class="filter-select">
          <option value="indexed_at">Date Added</option>
          <option value="created_at">Date Created</option>
          <option value="friendly_name">Name</option>
          <option value="view_count">Most Viewed</option>
          <option value="duration">Duration</option>
          <option value="size">Size</option>
        </select>
      </div>

      <div class="filter-section">
        <div class="filter-toggle-row">
          <label class="filter-label filter-label-inline" for="featured-section-toggle">Recently Added</label>
          <label class="switch-toggle" for="featured-section-toggle" aria-label="Toggle Recently Added section">
            <input type="checkbox" id="featured-section-toggle" class="switch-toggle-input" checked />
            <span class="switch-toggle-track" aria-hidden="true"></span>
          </label>
        </div>
      </div>
      </div>
    </aside>

    <main class="main-content">
      <div id="stats-bar" class="stats-bar"></div>
      <div id="active-filters" class="active-filters" style="display:none"></div>

      <section class="all-media-section">
        <h2 class="section-title" id="grid-title">All Media</h2>
        <div class="video-grid" id="media-grid"></div>
      </section>

      <section class="featured-section" id="featured-section">
        <h2 class="section-title">Recently Added</h2>
        <div class="video-grid" id="featured-grid"></div>
      </section>
    </main>
  </div>

  <script src="/js/admin-mode.js"></script>
  <script src="/js/app.js?v=20260504-disable-virtual-preview-transcode"></script>
</body>
</html>
