<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos – OurTube</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">📺 OurTube</a>
      <form class="search-form" action="/search.html" method="GET">
        <input type="search" name="q" class="search-input" placeholder="Search photos…" autocomplete="off" />
        <button type="submit" class="search-btn">🔍</button>
      </form>
      <nav class="header-nav">
        <a href="/" class="nav-link">🎬 Videos</a>
        <a href="/photos.html" class="nav-link active">📷 Photos</a>
      </nav>
    </div>
  </header>

  <div class="page-layout">
    <aside class="sidebar">
      <button
        id="sidebar-toggle-btn"
        class="sidebar-toggle-btn"
        type="button"
        aria-expanded="true"
        aria-label="Hide filters"
        title="Hide filters"
      >
        <span class="sidebar-toggle-chevron" aria-hidden="true"></span>
      </button>
      <div class="sidebar-content">
      <div class="filter-section">
        <label class="filter-label">Collections</label>
        <div class="filter-options" id="source-location-filter">
          <label><input type="radio" name="source_location_id" value="" checked /> All Collections</label>
        </div>
      </div>

      <h3 class="sidebar-title">Filter</h3>

      <div class="filter-section">
        <label class="filter-label" for="year-filter">Year</label>
        <select id="year-filter" class="filter-select">
          <option value="">All Years</option>
        </select>
      </div>

      <div class="filter-section">
        <label class="filter-label" for="location-filter">Location</label>
        <select id="location-filter" class="filter-select">
          <option value="">All Locations</option>
        </select>
      </div>

      <div class="filter-section">
        <label class="filter-label">Sort By</label>
        <select id="sort-select" class="filter-select">
          <option value="indexed_at">Date Added</option>
          <option value="created_at">Date Created</option>
          <option value="friendly_name">Name</option>
        </select>
      </div>
      </div>
    </aside>

    <main class="main-content">
      <div id="stats-bar" class="stats-bar"></div>
      <div id="active-filters" class="active-filters" style="display:none"></div>
      <h2 class="section-title" id="grid-title">All Photos</h2>
      <div class="video-grid photo-grid" id="media-grid"></div>
      <div id="load-more-container" class="load-more-container">
        <button id="load-more-btn" class="load-more-btn" style="display:none">Load More</button>
        <p id="end-message" style="display:none;color:#888;text-align:center">No more items</p>
      </div>
    </main>
  </div>

  <script>
    // Photos page uses app.js with a forced type filter
    window.OURTUBE_FORCE_TYPE = 'photo';
  </script>
  <script src="/js/admin-mode.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
